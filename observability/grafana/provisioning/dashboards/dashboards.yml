apiVersion: 1

# Loads any dashboard JSON found in the mounted dashboards folder on startup.
providers:
  - name: Dazzled
    orgId: 1
    folder: Dazzled
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
