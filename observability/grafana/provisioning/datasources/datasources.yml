apiVersion: 1

# Auto-provisioned data sources so Grafana is wired up on first start.
# Fixed uids let the provisioned dashboard reference them reliably.
datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
